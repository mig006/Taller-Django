<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}MusicApp{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #eef3f0;
            --bg-soft: #f7faf8;
            --surface: #ffffff;
            --surface-2: #f1f6f3;
            --text-main: #13221b;
            --text-soft: #4f6359;
            --brand: #157347;
            --brand-2: #1c8b57;
            --brand-glow: rgba(21, 115, 71, 0.18);
            --border: rgba(19, 34, 27, 0.12);
            --danger: #c93f3f;
            --shadow-md: 0 14px 40px rgba(20, 53, 37, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Source Sans 3", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 12% 18%, rgba(74, 150, 112, 0.24), transparent 35%),
                radial-gradient(circle at 88% 8%, rgba(112, 173, 140, 0.25), transparent 30%),
                linear-gradient(160deg, var(--bg-main), var(--bg-soft));
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: 0.2px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.85) !important;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 22px rgba(34, 67, 52, 0.08);
        }

        .navbar-brand {
            color: var(--text-main) !important;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .app-shell {
            padding-bottom: 2rem;
        }

        .surface,
        .card {
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 250, 248, 0.98));
            box-shadow: var(--shadow-md);
            border-radius: 18px;
        }

        .page-header {
            animation: fade-slide 0.42s ease-out;
        }

        .table-wrap {
            overflow: hidden;
            animation: fade-slide 0.48s ease-out;
        }

        .table {
            color: var(--text-main);
            margin-bottom: 0;
        }

        .table thead th {
            background: linear-gradient(120deg, #d7ece1, #c8e4d6);
            color: #224736;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.78rem;
        }

        .table tbody tr {
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .table tbody tr:hover {
            background: #f2faf5;
            transform: translateY(-1px);
        }

        .badge-genero {
            background: #daefe4;
            color: #1d553a;
            font-weight: 600;
            border: 1px solid #b9ddca;
        }

        .divider {
            border-color: #cce2d5;
            opacity: 1;
        }

        a {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            color: var(--brand-2);
        }

        .btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.5rem 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            border-color: transparent;
            box-shadow: 0 8px 16px var(--brand-glow);
        }

        .btn-success:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .btn-outline-warning,
        .btn-outline-danger,
        .btn-outline-secondary {
            background: #ffffff;
            border-width: 1px;
        }

        .btn-icon {
            width: 2.15rem;
            height: 2.15rem;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .text-secondary {
            color: var(--text-soft) !important;
        }

        .form-label {
            color: #264536;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #c5d8ce;
            background-color: #fbfdfc;
            color: var(--text-main);
            padding: 0.58rem 0.7rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--brand-2);
            box-shadow: 0 0 0 0.2rem rgba(28, 139, 87, 0.18);
            background-color: #ffffff;
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.72);
            border: 1px dashed #b8d2c2;
            border-radius: 18px;
            animation: fade-slide 0.4s ease-out;
        }

        .confirm-card h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        @keyframes fade-slide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .page-header {
                gap: 0.8rem;
            }

            .page-header h1 {
                font-size: 1.45rem;
            }

            .btn {
                padding: 0.45rem 0.78rem;
            }

            .surface,
            .card {
                border-radius: 14px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'cancion_lista' %}">
                <i class="bi bi-music-note-beamed"></i> MusicApp
            </a>
        </div>
    </nav>

    <main class="container app-shell">
        {% block contenido %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
